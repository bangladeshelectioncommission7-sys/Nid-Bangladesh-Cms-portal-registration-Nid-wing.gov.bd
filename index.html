<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS - NID DATABASE PORTAL | নির্বাচন কমিশন</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; background: linear-gradient(135deg, #f0f4f8 0%, #d9e4f0 100%); min-height: 100vh; color: #333; }
        .header { background: linear-gradient(90deg, #0b5ed7, #0a4ab8); color: white; padding: 18px 25px; font-size: 21px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .logo { width: 62px; height: 62px; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 12px rgba(255,255,255,0.7); }
        .container { display: flex; min-height: calc(100vh - 78px); }
        .sidebar { width: 245px; background: white; border-right: 1px solid #ddd; box-shadow: 3px 0 10px rgba(0,0,0,0.08); }
        .sidebar ul { list-style: none; }
        .sidebar ul li a { display: block; padding: 15px 22px; text-decoration: none; color: #222; border-bottom: 1px solid #f0f0f0; transition: all 0.3s; }
        .sidebar ul li a:hover { background: #0b5ed7; color: white; }
        .content { flex: 1; padding: 25px; }
        .box { background: white; padding: 28px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .form-control { width: 100%; padding: 13px; margin: 12px 0; border: 1px solid #aaa; border-radius: 8px; font-size: 16px; }
        .btn { padding: 12px 24px; background: #0b5ed7; border: none; color: white; cursor: pointer; border-radius: 8px; font-size: 16px; }
        .btn:hover { background: #0949a5; }
        #loginContainer, #otpContainer { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        #loginForm, #otpForm, #registerForm { background: white; padding: 35px 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.18); max-width: 420px; text-align: center; }
        .success-text { color: #28a745; }
        .error-text { color: #dc3545; }
        #dashboard { display: none; }
        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); z-index: 9999; justify-content: center; align-items: center; }
        .spinner { width: 62px; height: 62px; border: 6px solid #f3f3f3; border-top: 6px solid #0b5ed7; border-radius: 50%; animation: spin 1.1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { margin-top: 18px; color: white; font-size: 19px; font-weight: 500; }
    </style>
</head>
<body>

    <!-- LOADING -->
    <div id="loadingOverlay">
        <div style="text-align:center;">
            <div class="spinner"></div>
            <div class="loading-text">লোড হচ্ছে...</div>
        </div>
    </div>

    <!-- LOGIN / REGISTER -->
    <div id="loginContainer">
        <form id="loginForm">
            <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Election_Commission_Logo.svg">
            <h3 style="margin:20px 0 25px;">CMS - NID DATABASE পার্টনার পোর্টাল</h3>
            <input type="text" id="userid" class="form-control" placeholder="ইউজার আইডি" required>
            <input type="password" id="password" class="form-control" placeholder="পাসওয়ার্ড" required>
            <button type="submit" class="btn">লগইন</button>
            <p style="margin-top:15px;"><a href="#" id="showRegister">রেজিস্ট্রেশন করুন</a></p>
            <div id="message"></div>
        </form>

        <form id="registerForm" style="display:none;">
            <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Election_Commission_Logo.svg">
            <h3 style="margin:20px 0 25px;">রেজিস্ট্রেশন</h3>
            <input type="text" id="regUserid" class="form-control" placeholder="ইউজার আইডি" required>
            <input type="password" id="regPassword" class="form-control" placeholder="পাসওয়ার্ড" required>
            <button type="submit" class="btn">রেজিস্টার</button>
            <p style="margin-top:15px;"><a href="#" id="showLogin">লগইন পেজে ফিরুন</a></p>
            <div id="regMessage"></div>
        </form>
    </div>

    <!-- OTP -->
    <div id="otpContainer" style="display:none;">
        <form id="otpForm">
            <h3>OTP যাচাই</h3>
            <input type="tel" id="mobileNumber" class="form-control" placeholder="মোবাইল নাম্বার (01XXXXXXXXX)" maxlength="11" required>
            <button type="button" id="requestOtpBtn" class="btn" style="margin:12px 0; width:100%;">OTP পাঠান</button>
            <input type="text" id="otp" class="form-control" placeholder="OTP দিন" maxlength="6" required>
            <button type="submit" class="btn" style="width:100%;">সাবমিট</button>
            <div id="otpMessage" style="margin-top:15px; font-weight:bold;"></div>
        </form>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <div class="header">
            <div style="display:flex;align-items:center;">
                <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Election_Commission_Logo.svg">
                <span style="margin-left:12px;">CMS - NID DATABASE PORTAL</span>
            </div>
            <button class="btn" onclick="logout()">লগআউট</button>
        </div>
        <div class="container">
            <div class="sidebar">
                <ul>
                    <li><a onclick="showForm('nid')">এনআইডি সার্চ</a></li>
                    <li><a onclick="showForm('mobile')">মোবাইল সার্চ</a></li>
                    <li><a onclick="showForm('birth')">জন্ম নিবন্ধন</a></li>
                    <li><a onclick="showForm('formno')">ফর্ম নাম্বার</a></li>
                    <li><a onclick="showForm('correction')">সংশোধন</a></li>
                    <li><a onclick="showForm('brta')">BRTA সার্ভিস</a></li>
                </ul>
            </div>
            <div class="content">
                <div class="box" id="formArea"><h3>একটি অপশন নির্বাচন করুন</h3></div>
                <div id="accessMessage"></div>
            </div>
        </div>
    </div>

    <script>
        // ================== One9 SMS Config ==================
        const SMS_API_URL = "https://sms.one9.one/sms/api";
        const SMS_API_KEY = "633|YOUR_API_KEY";   // ← এখানে তোমার আসল API KEY দাও
        const SMS_ACTION = "send-sms";
        const SMS_UNICODE = "1";
        const OTP_TEMPLATE = "Cms Partner portal (NID / BRTA সেবা): আপনার OTP কোড {{OTP}}। ২ মিনিটের মধ্যে ওটিপি সাবমিট করুন। কারো সাথে শেয়ার করবেন না।";

        let generatedOtp = "";

        function showLoading(text = "লোড হচ্ছে...") {
            document.getElementById("loadingOverlay").style.display = "flex";
            document.querySelector(".loading-text").innerText = text;
        }

        function hideLoading() {
            document.getElementById("loadingOverlay").style.display = "none";
        }

        // Login & Register (আগের মতো)
        document.getElementById("showRegister").onclick = e => { e.preventDefault(); document.getElementById("loginForm").style.display="none"; document.getElementById("registerForm").style.display="block"; };
        document.getElementById("showLogin").onclick = e => { e.preventDefault(); document.getElementById("registerForm").style.display="none"; document.getElementById("loginForm").style.display="block"; };

        document.getElementById("registerForm").onsubmit = e => {
            e.preventDefault();
            showLoading("রেজিস্ট্রেশন হচ্ছে...");
            setTimeout(() => {
                hideLoading();
                localStorage.setItem("user", JSON.stringify({u: document.getElementById("regUserid").value, p: document.getElementById("regPassword").value}));
                document.getElementById("regMessage").innerHTML = "রেজিস্ট্রেশন সফল ✔";
                document.getElementById("regMessage").className = "success-text";
            }, 800);
        };

        document.getElementById("loginForm").onsubmit = e => {
            e.preventDefault();
            showLoading("লগইন হচ্ছে...");
            setTimeout(() => {
                hideLoading();
                let stored = JSON.parse(localStorage.getItem("user"));
                if (!stored || stored.u !== document.getElementById("userid").value || stored.p !== document.getElementById("password").value) {
                    document.getElementById("message").innerHTML = "ভুল তথ্য ❌";
                    document.getElementById("message").className = "error-text";
                    return;
                }
                document.getElementById("loginContainer").style.display = "none";
                document.getElementById("otpContainer").style.display = "flex";
            }, 800);
        };

        // ================== REAL OTP SEND ==================
        document.getElementById("requestOtpBtn").onclick = async () => {
            const mobile = document.getElementById("mobileNumber").value.trim();
            const otpMsg = document.getElementById("otpMessage");

            if (!/^01[3-9]\d{8}$/.test(mobile)) {
                otpMsg.innerHTML = "সঠিক মোবাইল নাম্বার দিন (01XXXXXXXXX)";
                otpMsg.className = "error-text";
                return;
            }

            generatedOtp = Math.floor(100000 + Math.random() * 900000).toString(); // 6 digit OTP

            const message = OTP_TEMPLATE.replace("{{OTP}}", generatedOtp);

            showLoading("OTP পাঠানো হচ্ছে...");

            try {
                // One9 SMS API (GET method - সাধারণত এভাবে কাজ করে)
                const url = `${SMS_API_URL}?key=${encodeURIComponent(SMS_API_KEY)}&action=${SMS_ACTION}&to=${mobile}&message=${encodeURIComponent(message)}&unicode=${SMS_UNICODE}`;

                const response = await fetch(url, { method: "GET" });
                const data = await response.text();   // সাধারণত text response আসে

                hideLoading();

                if (response.ok && data.toLowerCase().includes("success") || data.toLowerCase().includes("sent")) {
                    otpMsg.innerHTML = `OTP সফলভাবে পাঠানো হয়েছে!<br><small>মোবাইলে চেক করুন</small>`;
                    otpMsg.className = "success-text";
                } else {
                    otpMsg.innerHTML = `SMS পাঠাতে সমস্যা হয়েছে।<br>Response: ${data.substring(0, 100)}`;
                    otpMsg.className = "error-text";
                }
            } catch (err) {
                hideLoading();
                otpMsg.innerHTML = "নেটওয়ার্ক বা API এরর হয়েছে। API Key সঠিক আছে কিনা চেক করুন।";
                otpMsg.className = "error-text";
                console.error(err);
            }
        };

        // OTP Verify
        document.getElementById("otpForm").onsubmit = e => {
            e.preventDefault();
            const enteredOtp = document.getElementById("otp").value.trim();
            const otpMsg = document.getElementById("otpMessage");

            if (!generatedOtp) {
                otpMsg.innerHTML = "প্রথমে OTP পাঠান";
                otpMsg.className = "error-text";
                return;
            }

            showLoading("OTP যাচাই হচ্ছে...");
            setTimeout(() => {
                hideLoading();
                if (enteredOtp === generatedOtp) {
                    document.getElementById("otpContainer").style.display = "none";
                    document.getElementById("dashboard").style.display = "block";
                } else {
                    otpMsg.innerHTML = "ভুল OTP ❌ আবার চেষ্টা করুন";
                    otpMsg.className = "error-text";
                }
            }, 800);
        };

        function logout() { location.reload(); }

        // Search functions (আগের মতো রাখা হয়েছে)
        function showForm(type) { /* ... তোমার আগের showForm ফাংশন ... */ }
        function backToDefault() { /* ... */ }
        function performSearch(type) { /* ... BRTA আলাদা মেসেজ ... */ }
    </script>
</body>
</html>
