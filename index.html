<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS - NID DATABASE PORTAL</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial;background:#f4f6f9;}
.header{background:#0b5ed7;color:#fff;padding:15px;display:flex;justify-content:space-between;}
.container{display:flex;}
.sidebar{width:220px;background:#fff;border-right:1px solid #ddd;}
.sidebar ul{list-style:none;}
.sidebar ul li a{display:block;padding:12px;cursor:pointer;}
.sidebar ul li a:hover{background:#f0f0f0;}
.content{flex:1;padding:20px;}
.box{background:#fff;padding:20px;border-radius:8px;}
.form-control{width:100%;padding:10px;margin:10px 0;}
.btn{padding:10px 20px;background:#0b5ed7;color:#fff;border:none;border-radius:5px;}
#dashboard{display:none;}
#accessMessage{margin-top:20px;text-align:center;}
.result-box{padding:12px;border:1px solid #ddd;border-radius:6px;margin-top:10px;cursor:pointer;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginContainer">
<form id="loginForm">
<h3>Login</h3>
<input id="userid" class="form-control" placeholder="User ID">
<input id="password" type="password" class="form-control" placeholder="Password">
<button class="btn">Login</button>
</form>
</div>

<!-- OTP -->
<div id="otpContainer" style="display:none;">
<form id="otpForm">
<h3>OTP</h3>
<input id="otp" class="form-control" placeholder="OTP">
<button class="btn">Submit</button>
</form>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="header">
<span>Dashboard</span>
<button class="btn" onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="sidebar">
<ul>
<li><a onclick="showForm('nid')">এনআইডি সার্চ</a></li>
<li><a onclick="showForm('mobile')">মোবাইল সার্চ</a></li>
<li><a onclick="showForm('birth')">জন্ম নিবন্ধন</a></li>

<!-- ✅ NEW BRTA -->
<li><a onclick="showForm('brta')">BRTA Service</a></li>

</ul>
</div>

<div class="content">
<div class="box" id="formArea">
<h3>একটি অপশন নির্বাচন করুন</h3>
</div>

<div id="accessMessage"></div>
</div>

</div>
</div>

<script>

// login flow
document.getElementById("loginForm").addEventListener("submit",e=>{
e.preventDefault();
document.getElementById("loginContainer").style.display="none";
document.getElementById("otpContainer").style.display="block";
});

document.getElementById("otpForm").addEventListener("submit",e=>{
e.preventDefault();
document.getElementById("otpContainer").style.display="none";
document.getElementById("dashboard").style.display="block";
});

function logout(){location.reload();}

// main form
function showForm(type){

document.getElementById("accessMessage").innerHTML="";

// 👉 BRTA SYSTEM
if(type==="brta"){
document.getElementById("formArea").innerHTML=`
<h3>BRTA Service</h3>

<div class="result-box" onclick="brtaAccess()">📄 নতুন লাইসেন্স আবেদন</div>
<div class="result-box" onclick="brtaAccess()">🔄 লাইসেন্স নবায়ন</div>
<div class="result-box" onclick="brtaAccess()">❌ আবেদন বাতিল</div>
`;
return;
}

// old system
document.getElementById("formArea").innerHTML=`
<h3>${type}</h3>
<input class="form-control" placeholder="Search">
<button class="btn" onclick="showAccess()">Search</button>
`;
}

// old access
function showAccess(){
document.getElementById("accessMessage").innerHTML=`
<div style="color:red;font-weight:bold;">
আপনার এক্সেস নেই
</div>`;
}

// 👉 BRTA ACCESS MESSAGE
function brtaAccess(){
document.getElementById("accessMessage").innerHTML=`
<div style="color:red;font-weight:bold;padding:20px;border:2px solid #f5c6cb;background:#f8d7da;border-radius:8px;">
দুঃখীত আপনার BRTA এক্সেস যুক্ত নেই।<br>
অনুগ্রহ করে এক্সেস যুক্ত করুন।
</div>`;
}

</script>

</body>
</html>
