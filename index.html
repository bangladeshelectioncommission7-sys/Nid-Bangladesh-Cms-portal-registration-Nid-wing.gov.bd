<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS - NID DATABASE PORTAL</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, Helvetica, sans-serif; background: #f4f6f9; min-height: 100vh; }
.header { background: #0b5ed7; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
.logo { width: 50px; margin-right: 10px; }
.container { display: flex; flex-direction: row; min-height: calc(100vh - 60px); }
.sidebar { width: 220px; background: #fff; border-right: 1px solid #ddd; }
.sidebar ul { list-style: none; }
.sidebar ul li a { display: block; padding: 12px; text-decoration: none; color: #000; cursor: pointer; }
.sidebar ul li a:hover { background: #f0f0f0; }
.content { flex: 1; padding: 20px; }
.box { background: #fff; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
.form-control { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
.btn { padding: 10px 20px; background: #0b5ed7; border: none; color: white; cursor: pointer; border-radius: 5px; font-size: 16px; }
.btn:hover { background: #0949a5; }
#loginContainer, #otpContainer { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
#loginForm, #otpForm, #registerForm { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.15); width: 100%; max-width: 400px; text-align: center; }
#message, #otpMessage, #regMessage { margin-top: 15px; font-weight: bold; min-height: 22px; }
.success { color: green; }
.error { color: red; }
#dashboard { display: none; }

#loadingOverlay {
display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
background: rgba(0, 0, 0, 0.6); z-index: 9999;
justify-content: center; align-items: center;
}
.spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #0b5ed7; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.loading-text { margin-top: 15px; color: white; font-size: 18px; }

#accessMessage { color: red; font-weight: bold; margin-top: 20px; text-align: center; }
.back-btn { margin-bottom: 15px; width: auto; }
.result-box { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginContainer">
<div>
<form id="loginForm">
<h3>CMS - NID DATABASE পার্টনার পোর্টাল</h3>
<input type="text" id="userid" class="form-control" placeholder="ইউজার আইডি" required>
<input type="password" id="password" class="form-control" placeholder="পাসওয়ার্ড" required>
<button type="submit" class="btn">লগইন</button>
<p style="margin-top:15px;">অ্যাকাউন্ট নেই? <a href="#" id="showRegister">রেজিস্টার করুন</a></p>
<div id="message"></div>
</form>

<form id="registerForm" style="display:none;">
<h3>রেজিস্ট্রেশন</h3>
<input type="text" id="regUserid" class="form-control" required>
<input type="password" id="regPassword" class="form-control" required>
<button type="submit" class="btn">রেজিস্টার</button>
<p><a href="#" id="showLogin">লগইন পেজে ফিরুন</a></p>
<div id="regMessage"></div>
</form>
</div>
</div>

<!-- OTP -->
<div id="otpContainer" style="display:none;">
<form id="otpForm">
<h3>OTP যাচাই</h3>
<input type="tel" id="mobileNumber" class="form-control" placeholder="মোবাইল নাম্বার">
<button type="button" id="requestOtpBtn" class="btn">OTP পাঠান</button>
<input type="text" id="otp" class="form-control" placeholder="OTP দিন">
<button type="submit" class="btn">সাবমিট</button>
<div id="otpMessage"></div>
</form>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
<div class="header">
<span>CMS - NID DATABASE পার্টনার পোর্টাল</span>
<button class="btn" onclick="logout()">লগআউট</button>
</div>

<div class="container">
<div class="sidebar">
<ul>
<li><a onclick="showForm('nid')">এনআইডি সার্চ</a></li>
<li><a onclick="showForm('mobile')">মোবাইল সার্চ</a></li>
<li><a onclick="showForm('birth')">জন্ম নিবন্ধন সার্চ</a></li>
<li><a onclick="showForm('formno')">ফর্ম নাম্বার</a></li>
<li><a onclick="showForm('correction')">সংশোধন অনুমোদন</a></li>

<!-- ✅ BRTA ADD -->
<li><a onclick="showForm('brta')">BRTA সার্ভিস</a></li>

</ul>
</div>

<div class="content">
<div class="box" id="formArea">
<h3>একটি অপশন নির্বাচন করুন</h3>
</div>
<div id="accessMessage"></div>
</div>
</div>
</div>

<script>

// register + login (localStorage)
document.getElementById("showRegister").onclick = e => {
e.preventDefault();
loginForm.style.display="none";
registerForm.style.display="block";
};

document.getElementById("showLogin").onclick = e => {
e.preventDefault();
loginForm.style.display="block";
registerForm.style.display="none";
};

registerForm.onsubmit = e => {
e.preventDefault();
localStorage.setItem("user", JSON.stringify({
u: regUserid.value,
p: regPassword.value
}));
regMessage.innerHTML="রেজিস্ট্রেশন সফল";
};

loginForm.onsubmit = e => {
e.preventDefault();
let d=JSON.parse(localStorage.getItem("user"));
if(!d || d.u!==userid.value || d.p!==password.value){
message.innerHTML="ভুল তথ্য";
return;
}
loginContainer.style.display="none";
otpContainer.style.display="flex";
};

// OTP simple demo
requestOtpBtn.onclick=()=>{
otpMessage.innerHTML="OTP পাঠানো হয়েছে (1234)";
window.gen="1234";
};

otpForm.onsubmit=e=>{
e.preventDefault();
if(otp.value===window.gen){
otpContainer.style.display="none";
dashboard.style.display="block";
}else{
otpMessage.innerHTML="ভুল OTP";
}
};

function logout(){location.reload();}

// showForm
function showForm(type){

if(type==="brta"){
formArea.innerHTML=`
<button class="btn back-btn" onclick="backToDefault()">ফিরে যান</button>
<h3>BRTA সার্ভিস</h3>

<button class="btn" style="width:100%;margin:5px 0;" onclick="showBrta('new')">নতুন লাইসেন্স আবেদন</button>
<button class="btn" style="width:100%;margin:5px 0;" onclick="showBrta('renew')">লাইসেন্স নবায়ন</button>
<button class="btn" style="width:100%;margin:5px 0;" onclick="showBrta('cancel')">আবেদন বাতিল</button>
`;
return;
}

let title="";
if(type==="nid") title="এনআইডি সার্চ";
else if(type==="mobile") title="মোবাইল সার্চ";
else if(type==="birth") title="জন্ম নিবন্ধন সার্চ";
else if(type==="formno") title="ফর্ম নাম্বার";
else if(type==="correction") title="সংশোধন অনুমোদন";

formArea.innerHTML=`
<button class="btn back-btn" onclick="backToDefault()">ফিরে যান</button>
<h3>${title}</h3>
<input type="text" id="searchInput" class="form-control">
<button class="btn" onclick="performSearch()">সার্চ করুন</button>
<div id="resultArea"></div>
`;
}

// BRTA submenu
function showBrta(type){
let t="";
if(type==="new") t="নতুন লাইসেন্স আবেদন";
if(type==="renew") t="লাইসেন্স নবায়ন";
if(type==="cancel") t="আবেদন বাতিল";

formArea.innerHTML=`
<button class="btn back-btn" onclick="showForm('brta')">ফিরে যান</button>
<h3>${t}</h3>
<input class="form-control">
<button class="btn" onclick="performSearch()">সাবমিট</button>
`;
}

function backToDefault(){
formArea.innerHTML="<h3>একটি অপশন নির্বাচন করুন</h3>";
}

function performSearch(){
accessMessage.innerHTML="দুঃখিত, এক্সেস নেই। পেমেন্ট করুন।";
}

</script>

</body>
</html>
